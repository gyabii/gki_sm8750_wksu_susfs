# build.yml kanged from Rezoss Reza modified to build kernel with WildKSU and SuSFS using the stable branch
name: Build kernel (WildKSU, SuSFS, `stable` branch)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4 

      - name: Set up the toolchain
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            bc bison build-essential curl flex \
            g++-multilib gcc-multilib git gnupg \
            lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libssl-dev \
            lzop zlib1g-dev pahole dwarves cpio zip \
            python3 python-is-python3 tar perl lz4 jq

      - name: Clone source
        run: |
          git clone --depth=1 -b android15-6.6-lts https://android.googlesource.com/kernel/common kernel

          # Determine the current kernel version
          echo "KERNEL_VERSION=$(grep -m1 '^SUBLEVEL =' ./kernel/Makefile | awk '{print $3}')" >> $GITHUB_ENV
          
          
      - name: Apply WildKSU with SuSFS
        run: |
          set -euxo pipefail
          cd kernel
          
          # Integrate WildKSU
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/refs/heads/stable/kernel/setup.sh" | bash -s stable
          
          # Integrate SuSFS
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6
          
          SUSFS_KERNEL_PATCH="susfs4ksu/kernel_patches/50_add_susfs_in_gki-android16-6.6.patch"
          patch -p1 < "$SUSFS_KERNEL_PATCH"
          
          mkdir -p fs
          mkdir -p include/linux

          # Always replace fs/susfs.c
          cp -f susfs4ksu/kernel_patches/fs/susfs.c fs/susfs.c
          
          # Always replace include/linux/susfs.h
          cp -f susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/susfs.h
          
          # Always replace include/linux/susfs_def.h
          cp -f susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/susfs_def.h
          
          for f in fs/susfs.c include/linux/susfs.h include/linux/susfs_def.h; do
            if [ -f "$f" ]; then echo "Found: $f"; else echo "Missing: $f"; fi
          done
          
          # Clean up SUSFS repo (we only needed kernel patches, not KSU integration)
          rm -rf susfs4ksu

          CONFIG_FILE=arch/arm64/configs/gki_defconfig
          cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_HAVE_KPROBES=y
          CONFIG_KSU=y
          CONFIG_KSU_KPROBES_HOOK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=n
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=n
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          EOF

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Build the kernel
        run: |
          cd kernel
          #!/usr/bin/env bash
          set -euo pipefail
          # (env-overridable)
          KERNEL_DEFCONFIG=${KERNEL_DEFCONFIG:-gki_defconfig}
          CLANG_VERSION=${CLANG_VERSION:-clang-r584948}
          OUT_DIR=${OUT_DIR:-out}
          CLANG_DIR=${CLANG_DIR:-"$HOME/tools/google-clang"}
          CLANG_BINARY="$CLANG_DIR/bin/clang"
          START_TIME=$(date +%s)

          # --- pretty logs ---
          GREEN='\033[0;32m'; YELLOW='\033[1;33m'; RED='\033[0;31m'; NC='\033[0m'
          info(){ echo -e "${GREEN}[INFO]${NC} $*"; }
          warn(){ echo -e "${YELLOW}[WARN]${NC} $*"; }
          err(){  echo -e "${RED}[ERROR]${NC} $*"; exit 1; }

          defconfig() {
            DEFCONFIG_FILE="arch/arm64/configs/$KERNEL_DEFCONFIG"
            echo "CONFIG_LOCALVERSION=\"-gyabi\"" >> "$CONFIG_FILE"  >/dev/null 2>&1
          }

          setup_clang() {
            info "Fetching clang version $CLANG_VERSION..."
            mkdir -p "$CLANG_DIR"
            TARBALL="$(mktemp)"

            URL_BASE="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive"
            CLANG_URL="$URL_BASE/mirror-goog-main-llvm-toolchain-source/${CLANG_VERSION}.tar.gz"

            if command -v wget >/dev/null 2>&1; then
              DOWNLOAD_CLANG=(wget -q --show-progress -O "$TARBALL" "$PRIMARY_URL")
            elif command -v curl >/dev/null 2>&1; then
              DOWNLOAD_CLANG=(curl -L --fail -o "$TARBALL" "$PRIMARY_URL")
            else
              err "Need wget or curl to download the toolchain."
            fi
    
            "${DOWNLOAD_CLANG[@]}"  >/dev/null 2>&1 || err "Download failed"

            info "Extracting toolchain..."
            tar -xzf "$TARBALL" -C "$CLANG_DIR"
            rm -f "$TARBALL"

            export PATH="$CLANG_DIR/bin:$PATH"
            ver="$("$CLANG_BINARY" --version | head -n1)"
            ver="$(echo "$ver" | sed -E 's/\(http[^)]*\)//g; s/[[:space:]]+/ /g; s/[[:space:]]+$//')"
            export KBUILD_COMPILER_STRING="$ver"
          }

           build_kernel() {
            info "Starting kernel build..."
            defconfig
            setup_clang
            mkdir -p "$OUT_DIR"

            make -j"$(nproc --all)" O="$OUT_DIR" ARCH=arm64 CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 \
       "$KERNEL_DEFCONFIG" || err "defconfig failed"

            make -j"$(nproc --all)" O="$OUT_DIR" ARCH=arm64 CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1 \
                 || err "Build failed"

            total=$(( $(date +%s) - START_TIME ))
            info "Build finished in $((total/60))m $((total%60))s."
          }

        # Always build
          build_kernel | tee "$GITHUB_WORKSPACE/build.log"

      - name: Package image with AnyKernel3
        id: package
        run: |
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          set -euxo pipefail
          unzip "${GITHUB_WORKSPACE}/anykernel.zip" -d anykernel/
          cp kernel/out/arch/arm64/boot/Image.gz anykernel/
          # Build final name
          ZIP_NAME="gki-6.6.${KERNEL_VERSION}-gyabii_wksu-susfs-$(date +%d%m%y-%H%M%S)"
          cd anykernel
          zip -r0 ../"${ZIP_NAME}".zip ./*
          echo "zip_path=$GITHUB_WORKSPACE/${ZIP_NAME}.zip" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          cd ..

      - name: Upload the flashable kernel
        uses: actions/upload-artifact@v4
        with:
          name: ${{steps.package.outputs.zip_name}}
          path: anykernel/


          
